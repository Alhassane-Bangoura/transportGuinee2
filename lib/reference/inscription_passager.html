<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Inscription Passager - Guinee Transport</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a3d75",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13181f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <header
            class="flex items-center bg-white dark:bg-slate-900 p-4 sticky top-0 z-50 shadow-sm border-b border-slate-200 dark:border-slate-800">
            <div class="flex-1 text-center">
                <h2 class="text-primary dark:text-blue-400 text-xl font-bold leading-tight tracking-tight">GUINEE
                    TRANSPORT</h2>
            </div>
        </header>
        <main class="flex-1 flex flex-col items-center justify-start px-4 py-8 max-w-lg mx-auto w-full">
            <div class="text-center mb-8">
                <h1 class="text-slate-900 dark:text-white text-3xl font-bold leading-tight mb-2">Inscription Passager
                </h1>
                <p class="text-slate-600 dark:text-slate-400 text-base font-normal">Voyagez simplement entre les villes
                </p>
            </div>
            <div
                class="w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 space-y-5">
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Nom complet</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">person</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="Entrez votre nom" type="text" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Numéro de
                        téléphone</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">phone_iphone</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="+224 000 00 00 00" type="tel" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Ville de
                        résidence</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">location_on</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="Ex: Conakry" type="text" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Email</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">mail</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="votre@email.com" type="email" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Mot de passe</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">lock</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="••••••••" type="password" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Confirmation mot de
                        passe</label>
                    <div class="relative flex items-center group">
                        <div class="absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">lock_reset</span>
                        </div>
                        <input
                            class="w-full h-14 pl-12 pr-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400"
                            placeholder="••••••••" type="password" />
                    </div>
                </div>
                <button
                    class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4">
                    Créer mon compte
                </button>
                <div class="pt-2 text-center">
                    <p class="text-slate-500 dark:text-slate-400 text-sm">
                        Déjà un compte ? <a class="text-primary font-semibold hover:underline" href="#">Se connecter</a>
                    </p>
                </div>
            </div>
            <div class="mt-8 text-center text-slate-400 text-xs px-6">
                En créant un compte, vous acceptez nos <a class="underline" href="#">Conditions d'Utilisation</a> et
                notre <a class="underline" href="#">Politique de Confidentialité</a>.
            </div>
        </main>
        <footer class="p-8 mt-auto">
            <div class="flex justify-center gap-4 text-slate-400">
                <span class="material-symbols-outlined">directions_bus</span>
                <span class="material-symbols-outlined">local_taxi</span>
                <span class="material-symbols-outlined">map</span>
            </div>
        </footer>
    </div>
</body>

</html>
