<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#cbd5e1",
                        "surface-bright": "#ffffff",
                        "on-primary-container": "#dbeafe",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#cbd5e1",
                        "tertiary-fixed-dim": "#94a3b8",
                        "surface-container-low": "#f8fafc",
                        "on-error-container": "#991b1b",
                        "primary": "#1a3d75",
                        "on-secondary-fixed-variant": "#334155",
                        "on-secondary": "#ffffff",
                        "error": "#ef4444",
                        "surface-dim": "#f6f7f8",
                        "secondary-container": "#f1f5f9",
                        "on-secondary-fixed": "#0f172a",
                        "inverse-on-surface": "#f8fafc",
                        "on-surface": "#0f172a",
                        "inverse-surface": "#1e293b",
                        "inverse-primary": "#93c5fd",
                        "surface": "#ffffff",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "secondary": "#475569",
                        "on-background": "#0f172a",
                        "secondary-fixed-dim": "#e2e8f0",
                        "on-surface-variant": "#475569",
                        "primary-fixed": "#dbeafe",
                        "on-primary": "#ffffff",
                        "primary-container": "#1a3d75",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#bfdbfe",
                        "tertiary": "#0f172a",
                        "secondary-fixed": "#f1f5f9",
                        "on-secondary-container": "#1e293b",
                        "error-container": "#fee2e2",
                        "background": "#f6f7f8",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#f1f5f9",
                        "surface-tint": "#1a3d75",
                        "surface-container": "#f1f5f9",
                        "outline": "#cbd5e1",
                        "on-tertiary-container": "#f8fafc",
                        "on-tertiary-fixed-variant": "#1e293b",
                        "surface-container-high": "#e2e8f0",
                        "on-primary-fixed": "#1e3a8a",
                        "tertiary-container": "#334155",
                        "on-tertiary-fixed": "#0f172a"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .route-thread::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 24px;
            bottom: 24px;
            width: 2px;
            background: repeating-linear-gradient(to bottom, #1a3d75 0, #1a3d75 4px, transparent 4px, transparent 8px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background font-body text-on-background min-h-screen flex flex-col items-center justify-center">
    <!-- Header Section -->
    <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-lg shadow-sm">
        <div class="flex items-center justify-between px-6 h-16 w-full max-w-md mx-auto">
            <div class="flex flex-col">
                <h1 class="font-headline font-extrabold tracking-tight text-primary text-xl">GUINEE TRANSPORT</h1>
                <p class="text-[10px] font-label font-medium text-secondary uppercase tracking-wider">Trouvez votre
                    trajet en quelques secondes</p>
            </div>
            <button class="text-primary hover:opacity-80 transition-opacity active:scale-95">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </header>
    <main class="flex-1 w-full max-w-md px-8 pt-24 pb-32 flex flex-col items-center justify-center space-y-12">
        <!-- Premium UI Illustration: Search Route Visualization -->
        <div
            class="relative w-full aspect-square max-w-[280px] bg-surface-container-low rounded-[2rem] p-6 shadow-sm border border-outline-variant/30 flex flex-col justify-center">
            <div class="absolute inset-0 opacity-10 pointer-events-none overflow-hidden rounded-[2rem]">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary-fixed-dim rounded-full blur-3xl"></div>
                <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-secondary-fixed-dim rounded-full blur-3xl"></div>
            </div>
            <!-- Route Visualization Component -->
            <div class="relative space-y-8 z-10">
                <!-- Departure Node -->
                <div class="flex items-center space-x-4">
                    <div
                        class="w-6 h-6 rounded-full border-4 border-primary bg-white flex items-center justify-center z-10">
                        <div class="w-1.5 h-1.5 bg-primary rounded-full"></div>
                    </div>
                    <div class="flex-1 bg-surface shadow-sm rounded-xl p-3 border border-outline-variant/50">
                        <p class="text-[10px] font-label font-bold text-primary uppercase tracking-widest mb-0.5">Départ
                        </p>
                        <p class="text-sm font-headline font-bold text-on-surface">Conakry, Kaloum</p>
                    </div>
                </div>
                <!-- The Vertical Thread -->
                <div class="absolute left-2.5 top-6 bottom-6 w-0.5 border-l-2 border-dashed border-primary/30 -z-0">
                </div>
                <!-- Path Animation Placeholder -->
                <div class="flex justify-center -my-2">
                    <div class="bg-primary/5 px-3 py-1 rounded-full flex items-center gap-2">
                        <span class="material-symbols-outlined text-[14px] text-primary">directions_bus</span>
                        <span class="text-[10px] font-bold text-primary tracking-tighter">8h 45m</span>
                    </div>
                </div>
                <!-- Destination Node -->
                <div class="flex items-center space-x-4">
                    <div
                        class="w-6 h-6 rounded-full border-4 border-primary-fixed-dim bg-primary flex items-center justify-center z-10 shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-[12px] text-white"
                            style="font-variation-settings: 'FILL' 1;">location_on</span>
                    </div>
                    <div class="flex-1 bg-surface shadow-sm rounded-xl p-3 border border-outline-variant/50">
                        <p class="text-[10px] font-label font-bold text-secondary uppercase tracking-widest mb-0.5">
                            Destination</p>
                        <p class="text-sm font-headline font-bold text-on-surface">Labé, Centre</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- Onboarding Text Content -->
        <div class="text-center space-y-4">
            <h2 class="text-[28px] font-headline font-extrabold text-on-surface leading-tight tracking-tight">
                Recherche Intelligente
            </h2>
            <p class="text-[15px] font-body text-secondary leading-relaxed max-w-[260px] mx-auto">
                Choisissez votre ville de départ et votre destination en un instant.
            </p>
        </div>
        <!-- Progress Indicator & CTA Container -->
        <div class="w-full space-y-8 mt-auto">
            <!-- Progress Stepper -->
            <div class="flex items-center justify-center gap-3">
                <div class="h-1.5 w-6 rounded-full bg-primary/20"></div>
                <div class="h-1.5 w-12 rounded-full bg-primary"></div>
                <div class="h-1.5 w-6 rounded-full bg-primary/20"></div>
            </div>
            <!-- Main CTA Button -->
            <div class="flex flex-col gap-4">
                <button
                    class="w-full h-14 bg-primary text-white font-headline font-bold rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                    Suivant
                    <span
                        class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
                </button>
                <button
                    class="w-full py-2 text-secondary font-label font-semibold text-sm hover:text-primary transition-colors">
                    Passer l'introduction
                </button>
            </div>
        </div>
    </main>
    <!-- Suppressed Navigation Shell for focused journey -->
    <!-- BottomNavBar is suppressed as per the task "Onboarding" rule -->
</body>

</html>
