<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#cbd5e1",
                        "surface-bright": "#ffffff",
                        "on-primary-container": "#dbeafe",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#cbd5e1",
                        "tertiary-fixed-dim": "#94a3b8",
                        "surface-container-low": "#f8fafc",
                        "on-error-container": "#991b1b",
                        "primary": "#1a3d75",
                        "on-secondary-fixed-variant": "#334155",
                        "on-secondary": "#ffffff",
                        "error": "#ef4444",
                        "surface-dim": "#f6f7f8",
                        "secondary-container": "#f1f5f9",
                        "on-secondary-fixed": "#0f172a",
                        "inverse-on-surface": "#f8fafc",
                        "on-surface": "#0f172a",
                        "inverse-surface": "#1e293b",
                        "inverse-primary": "#93c5fd",
                        "surface": "#ffffff",
                        "on-primary-fixed-variant": "#1d4ed8",
                        "secondary": "#475569",
                        "on-background": "#0f172a",
                        "secondary-fixed-dim": "#e2e8f0",
                        "on-surface-variant": "#475569",
                        "primary-fixed": "#dbeafe",
                        "on-primary": "#ffffff",
                        "primary-container": "#1a3d75",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#bfdbfe",
                        "tertiary": "#0f172a",
                        "secondary-fixed": "#f1f5f9",
                        "on-secondary-container": "#1e293b",
                        "error-container": "#fee2e2",
                        "background": "#f6f7f8",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#f1f5f9",
                        "surface-tint": "#1a3d75",
                        "surface-container": "#f1f5f9",
                        "outline": "#cbd5e1",
                        "on-tertiary-container": "#f8fafc",
                        "on-tertiary-fixed-variant": "#1e293b",
                        "surface-container-high": "#e2e8f0",
                        "on-primary-fixed": "#1e3a8a",
                        "tertiary-container": "#334155",
                        "on-tertiary-fixed": "#0f172a"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col">
    <!-- TopAppBar Navigation Shell Suppressed: Onboarding Context -->
    <header class="pt-12 px-8 pb-4 text-center">
        <div class="flex flex-col items-center gap-1">
            <h1 class="text-primary font-black text-2xl tracking-tighter uppercase font-headline">GUINEE TRANSPORT</h1>
            <p class="text-secondary font-medium text-sm tracking-wide italic">Voyagez facilement à travers la Guinée
            </p>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center px-6 max-w-lg mx-auto w-full">
        <!-- Modern Illustration Hero -->
        <div
            class="relative w-full aspect-[4/5] mt-8 mb-12 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-primary/10">
            <img class="absolute inset-0 w-full h-full object-cover"
                data-alt="Modern high-speed white bus traveling on a winding coastal road in Guinea with lush palm trees and clear blue sky in flat vector style"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuD15yPZEtjhSILW9WP_Q0LNxp54wBwb-wIqs7hxeHrbyxN9EkYHj5Kb9D19Vhf4Gq-iq82tNIEUxR0viFcWuCW2rGNaAfZ7K7XwGwcDWFp8_KKjx3bqYzAtq0qsiAQGkMv8kGWZnI4OOaM9ttqQJ4wUK8MqvcrHYBx9ozYFBYhEWvvwi7ScDBoFJp1FGhQSs6nD7fgjP0TqWfMuClSjkprO-RrARhozO_lWJe5OWL79FiylSSnvvuNDz58LDyNv9CkazR8Y2Df_XtPE" />
            <!-- Decorative Glassmorphism Overlay for Text Context -->
            <div class="absolute inset-0 bg-gradient-to-t from-primary/40 via-transparent to-transparent"></div>
        </div>
        <!-- Content Section -->
        <section class="text-center space-y-6">
            <h2 class="text-[30px] font-extrabold text-on-surface leading-tight tracking-tight font-headline">
                L'application simplifie le transport entre les villes.
            </h2>
            <p class="text-on-surface-variant text-base leading-relaxed max-w-[280px] mx-auto">
                Réservez vos trajets en quelques clics et voyagez en toute sécurité.
            </p>
        </section>
        <!-- Progress Indicator -->
        <div class="mt-12 flex items-center gap-3">
            <div class="h-1.5 w-8 rounded-full bg-primary"></div>
            <div class="h-1.5 w-2 rounded-full bg-outline"></div>
            <div class="h-1.5 w-2 rounded-full bg-outline"></div>
            <span class="ml-4 text-label text-xs font-bold text-secondary tracking-widest uppercase">Step 1/3</span>
        </div>
    </main>
    <!-- Call to Action Footer -->
    <footer class="p-8 w-full max-w-lg mx-auto">
        <button
            class="group w-full bg-primary text-on-primary py-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 hover:opacity-95 active:scale-[0.98] transition-all">
            <span class="font-headline font-bold text-lg tracking-wide">Suivant</span>
            <span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform"
                data-icon="arrow_forward">arrow_forward</span>
        </button>
    </footer>
    <!-- BottomNavBar Suppressed: Onboarding Context -->
</body>

</html>
